name: Build MidONe APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            python3-pip build-essential git python3 python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base openjdk-17-jdk unzip zip \
            autoconf automake libtool pkg-config

      - name: Install Python dependencies
        run: pip install buildozer cython kivy

      - name: Build APK
        run: yes | buildozer android debug

      - name: Find and copy APK
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" MidONe_Scanner.apk
            echo "✅ APK: $APK"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MidONe_Scanner
          path: MidONe_Scanner.apk
          retention-days: 7
