name: 🦁 MidONe Scanner — Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  #  مرحله ۱: خوندن ورژن از pubspec.yaml
  # ─────────────────────────────────────────
  read-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: 📋 Read version from pubspec.yaml
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //; s/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

  # ─────────────────────────────────────────
  #  مرحله ۲: Build Android APK
  # ─────────────────────────────────────────
  build-android:
    needs: read-version
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: 📦 Get packages
        run: flutter pub get

      - name: 📁 Ensure assets/xray dir exists
        run: |
          mkdir -p assets/xray
          echo "✅ assets/xray ready (xray binary not bundled — TLS-only mode)"
          # xray binary is NOT used — xray_validator.dart uses TLS check only.
          # Removed: xray-arm64 (35MB) + geoip.dat + geosite.dat → saves ~12MB APK

      - name: 🔨 Build APK
        run: flutter build apk --release --no-shrink

      - name: ✅ Verify APK
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ APK size: $SIZE"

      - name: 📦 Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             MidONeScannerV${{ needs.read-version.outputs.version }}.apk

      - name: 💾 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: MidONeScannerV${{ needs.read-version.outputs.version }}.apk
          retention-days: 7

  # ─────────────────────────────────────────
  #  مرحله ۳: Build Windows EXE
  # ─────────────────────────────────────────
  build-windows:
    needs: read-version
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐦 Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: 🖥 Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: 📦 Get packages
        run: flutter pub get

      - name: 🏗 Create windows platform files if missing
        shell: pwsh
        run: |
          if (-not (Test-Path "windows")) {
            flutter create --platforms=windows --project-name midone_scanner .
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add windows/
            git commit -m "chore: add windows platform files [skip ci]"
            git push
            Write-Host "✅ windows/ created and committed"
          } else {
            Write-Host "ℹ️ windows/ already exists"
          }

      - name: 📁 Ensure assets/xray dir exists (required by pubspec.yaml)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "assets\xray" | Out-Null
          Write-Host "✅ assets/xray directory ready"

      - name: 🔨 Build Windows Release
        run: flutter build windows --release

      - name: ✅ Verify EXE
        shell: pwsh
        run: |
          $exe = "build\windows\x64\runner\Release\midone_scanner.exe"
          if (Test-Path $exe) {
            $size = [math]::Round((Get-Item $exe).Length / 1MB, 2)
            Write-Host "✅ EXE found ($size MB)"
          } else {
            Write-Error "❌ EXE not found!"
            exit 1
          }

      - name: 📋 Copy VC++ Runtime DLLs
        shell: pwsh
        run: |
          $dest = "build\windows\x64\runner\Release"
          foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
            $src = "C:\Windows\System32\$dll"
            if (Test-Path $src) {
              Copy-Item $src "$dest\$dll" -Force
              Write-Host "✅ Copied $dll"
            }
          }

      - name: 📥 Download xray-core for Windows
        shell: pwsh
        run: |
          $xrayUrl = "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip"
          $xrayZip = "xray-windows-64.zip"
          $destDir = "build\windows\x64\runner\Release"
          Write-Host "⬇️ Downloading xray-core..."
          try {
            Invoke-WebRequest -Uri $xrayUrl -OutFile $xrayZip -UseBasicParsing -TimeoutSec 120
            Expand-Archive -Path $xrayZip -DestinationPath "xray_tmp" -Force
            # Copy only xray.exe (not the full package)
            if (Test-Path "xray_tmp\xray.exe") {
              Copy-Item "xray_tmp\xray.exe" "$destDir\xray.exe" -Force
              $size = [math]::Round((Get-Item "$destDir\xray.exe").Length / 1MB, 1)
              Write-Host "✅ xray.exe bundled ($size MB)"
            } else {
              # Try alternate name
              $found = Get-ChildItem "xray_tmp" -Filter "*.exe" | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "$destDir\xray.exe" -Force
                Write-Host "✅ xray.exe bundled as $($found.Name)"
              } else {
                Write-Host "⚠️ xray.exe not found in archive — skipping (TLS fallback will be used)"
              }
            }
          } catch {
            Write-Host "⚠️ xray download failed: $_ — TLS fallback will be used"
          }

      - name: 📦 Package as ZIP
        shell: pwsh
        run: |
          $ver = "${{ needs.read-version.outputs.version }}"
          $zip = "MidONe-Scanner-Windows-v$ver.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zip -Force
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          # Show what's in the zip
          $entries = [IO.Compression.ZipFile]::OpenRead($zip).Entries | Select-Object -ExpandProperty Name
          $hasXray = $entries -contains "xray.exe"
          Write-Host "✅ ZIP: $zip ($size MB) | xray bundled: $hasXray"
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: ✅ Verify ZIP contents
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $entries = [IO.Compression.ZipFile]::OpenRead($env:ZIP_NAME).Entries.Name
          # Required files — build fails without these
          $required = @("midone_scanner.exe", "flutter_windows.dll", "msvcp140.dll", "vcruntime140.dll")
          $allOk = $true
          foreach ($r in $required) {
            if ($entries -contains $r) { Write-Host "✅ $r" }
            else { Write-Host "❌ MISSING: $r"; $allOk = $false }
          }
          # Optional — xray.exe bundled (nice to have, not fatal)
          if ($entries -contains "xray.exe") {
            Write-Host "✅ xray.exe (bundled — Phase-2 Xray scan enabled)"
          } else {
            Write-Host "ℹ️  xray.exe not bundled — TLS fallback will be used"
          }
          if (-not $allOk) { exit 1 }

      - name: 💾 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

  # ─────────────────────────────────────────
  #  مرحله ۴: ساخت Release یکپارچه
  # ─────────────────────────────────────────
  release:
    needs: [read-version, build-android, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts

      - name: 📥 Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: ./artifacts

      - name: 📋 List artifacts
        run: ls -lh ./artifacts/

      - name: 🚀 Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.read-version.outputs.tag }}
          name: "🦁 MidONe Scanner — ${{ needs.read-version.outputs.tag }}"
          body: |
            <div align="center">

            # 🦁 MidONe Scanner — ${{ needs.read-version.outputs.tag }}

            **اسکنر حرفه‌ای آی‌پی تمیز**

            [![Android](https://img.shields.io/badge/⬇️%20دانلود%20APK-Android-brightgreen?style=for-the-badge)](https://github.com/mwhammadrezss/midonescanner-android/releases/download/${{ needs.read-version.outputs.tag }}/MidONeScannerV${{ needs.read-version.outputs.version }}.apk)
            [![Windows](https://img.shields.io/badge/⬇️%20دانلود%20ZIP-Windows-blue?style=for-the-badge)](https://github.com/mwhammadrezss/midonescanner-android/releases/download/${{ needs.read-version.outputs.tag }}/MidONe-Scanner-Windows-v${{ needs.read-version.outputs.version }}.zip)
            [![Telegram](https://img.shields.io/badge/کانال%20تلگرام-@mmdrlx-blue?style=for-the-badge&logo=telegram)](https://t.me/mmdrlx)

            </div>

            ---

            ## 📱 Android
            - فایل APK رو دانلود کن و نصب کن
            - اگر «منبع ناشناخته» داد، از تنظیمات مجوز بده

            ## 🖥 Windows
            - فایل ZIP رو دانلود کن
            - Extract کن توی یه پوشه
            - `midone_scanner.exe` رو اجرا کن

            ---

            > ساخته شده با Flutter 3.24.0 | Android + Windows
          files: |
            ./artifacts/MidONeScannerV${{ needs.read-version.outputs.version }}.apk
            ./artifacts/MidONe-Scanner-Windows-v${{ needs.read-version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
