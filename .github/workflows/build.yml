name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # تغییر حیاتی: استفاده از اوبونتو ۲۲ به جای آخرین نسخه برای سازگاری کامل با بیلدوزر
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Cloud Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clear Buildozer Cache
      run: |
        rm -rf .buildozer/
        rm -rf ~/.buildozer/

    # نصب پیش‌نیازها + اضافه شدن virtualenv و تنظیم مجدد cython
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev cmake ccache
        pip install --upgrade pip setuptools wheel virtualenv
        pip install buildozer cython

    # اجرای مستقیم بیلدوزر (دستور yes حذف شد تا اگر خطایی بود دقیقاً مشخص شود)
    - name: Build Android App with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MidONe-Scanner-APK
        path: bin/*.apk
