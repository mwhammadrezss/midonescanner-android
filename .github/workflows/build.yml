name: Build Android APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v4-${{ hashFiles('buildozer.spec') }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libgdbm-dev libnss3-dev libreadline-dev \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libltdl-dev ccache patchelf
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          python -m pip install --upgrade pip setuptools wheel virtualenv
          python -m pip install buildozer==1.5.0 cython==0.29.37
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build Android APK with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
        run: |
          set -o pipefail
          java -version
          buildozer --version
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Report buildozer errors
        if: failure()
        run: |
          echo "## Buildozer log (last 120 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -120 buildozer.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "## Error lines" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "ERROR|Error|FAILED|failed|Command failed|Traceback" buildozer.log | tail -60 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: buildozer.log
          if-no-files-found: warn

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MidONe-Scanner-APK
          path: bin/*.apk
          if-no-files-found: error
